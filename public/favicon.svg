<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Background (dark blue-black, matches src/config.ts COLOR_BACKGROUND) -->
  <rect x="0" y="0" width="64" height="64" fill="#0a0e27" />

  <!-- Field border (neon green, matches COLOR_BORDER) -->
  <rect x="0" y="0" width="64" height="64" fill="#00ff41" />
  <rect x="6" y="6" width="52" height="52" fill="#0a0e27" />

  <!-- Player marker (white diamond, matches COLOR_MARKER) -->
  <polygon points="32,16 48,32 32,48 16,32" fill="#ffffff" />

  <!-- Wisp (neon purple, matches COLOR_WISP_HEAD) -->
  <circle cx="48" cy="16" r="5" fill="#b967ff" />
</svg>
