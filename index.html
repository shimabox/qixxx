    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta name="description" content="線を引いて陣地を切り取る、ネオン風の陣取りアクションゲーム。ブラウザで無料、PC・スマホ対応。" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="QIXXX" />

    <meta property="og:image" content="https://qixxx.orukubami.sh/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0a0e27;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
      }

      /* #game-root (created by main.ts) is the flex child that fills
         whatever space is left above #touch-controls (docs/plan.md §5.3:
         "縦持ちレイアウト: フィールド上部・コントロール下部"). It stacks
         #hud-row directly above #canvas-wrap (docs/plan.md §12.1: "HUDを
         フィールド直上に"), and the canvas itself is letterboxed inside
         #canvas-wrap by main.ts's fitCanvasToViewport(), which also keeps
         #hud-row's width in sync with the canvas's on-screen width. The
         Title/StageClear/GameOver overlay (#screen) is centered over the
         canvas by being absolutely positioned inside #canvas-wrap. */
      #game-canvas {
        display: block;
        border: 2px solid #00ff41;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

    </style>
  </head>
  <body>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
